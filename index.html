<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Regenradar München</title>
<meta name="description" content="Animiertes Regenradar für München — letzte 2 Stunden plus Nowcast, Daten von RainViewer." />
<meta name="theme-color" content="#0C1320" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="vendor/fonts/fonts.css" />
<link rel="stylesheet" href="vendor/leaflet/leaflet.min.css" />
<style>
  :root{
    --ink:#EAF1F8; --muted:#9AA9BD; --panel:rgba(18,27,40,.78);
    --line:rgba(255,255,255,.10); --now:#F4C04E;
    --display:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--body); background:#0C1320; color:var(--ink)}
  #map{position:fixed; inset:0; background:#0C1320}

  .panel{
    position:fixed; z-index:1000;
    background:var(--panel); border:1px solid var(--line);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border-radius:16px; box-shadow:0 18px 44px -24px rgba(0,0,0,.8);
  }

  /* Kopf */
  .head{
    top:max(12px,env(safe-area-inset-top)); left:12px; right:auto;
    padding:9px 14px; display:flex; align-items:center; gap:12px;
  }
  .title{display:flex; flex-direction:column; gap:3px; min-width:0}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-weight:600}
  .net{margin-left:8px; padding:2px 7px; border-radius:999px; font-size:10px;
       letter-spacing:.04em; text-transform:none; color:#0C1320; background:var(--now); font-weight:700}
  .stamp{font-family:var(--display); font-weight:600; font-size:1.05rem; font-variant-numeric:tabular-nums; white-space:nowrap}
  .stamp .kind{color:var(--muted); font-weight:500; font-size:.82em}
  .stamp .kind.fc{color:var(--now)}

  /* Steuerung unten */
  .controls{
    left:12px; right:12px; bottom:max(14px,env(safe-area-inset-bottom));
    padding:12px 14px; display:flex; flex-direction:column; gap:10px;
  }
  .row{display:flex; align-items:center; gap:12px}
  .play{
    flex:0 0 auto; width:42px; height:42px; border-radius:50%;
    border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--ink);
    cursor:pointer; display:grid; place-items:center; transition:background .2s,border-color .2s;
  }
  .play:hover{background:rgba(255,255,255,.1)}
  .play:focus-visible{outline:2px solid var(--now); outline-offset:2px}
  .play svg{width:18px; height:18px; fill:currentColor}

  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:999px;
    background:linear-gradient(90deg, rgba(255,255,255,.5) var(--pct,0%), rgba(255,255,255,.14) var(--pct,0%));
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--ink); border:2px solid #0C1320; cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%; background:var(--ink); border:2px solid #0C1320; cursor:pointer;
  }
  /* Zeitachse unter dem Slider (an Slider-Anfang ausgerichtet: 42px Button + 12px Gap) */
  .axis{position:relative; margin-left:54px; height:40px; padding-top:13px}
  .axis .now{position:absolute; top:0; transform:translateX(-50%);
             color:var(--now); font-weight:600; letter-spacing:.04em; text-transform:uppercase;
             font-size:9px; white-space:nowrap; font-variant-numeric:tabular-nums}
  .ticks{position:relative; height:8px}
  .ticks i{position:absolute; top:0; width:1px; height:5px; background:rgba(255,255,255,.28);
           transform:translateX(-50%)}
  .ticks i.fc{background:rgba(244,192,78,.45)}
  .ticks i.now{height:8px; width:2px; background:var(--now)}
  .labels{position:relative; height:14px; margin-top:3px;
          font-size:10px; color:var(--muted); font-variant-numeric:tabular-nums}
  .labels span{position:absolute; white-space:nowrap}
  .labels .start{left:0}
  .labels .end{right:0}

  .meta{display:flex; align-items:center; justify-content:space-between; gap:10px;
        font-size:11px; color:var(--muted)}
  .meta a{color:var(--muted)} .meta a:hover{color:var(--ink)}
  .legend{display:flex; align-items:center; gap:6px}
  .legend i{width:34px; height:7px; border-radius:3px; display:inline-block;
            background:linear-gradient(90deg,#9BE1F5,#3FA0E0,#2C6FC6,#7E58C8)}

  /* Stundenvorhersage (Open-Meteo) */
  .fc{display:flex; flex-direction:column; gap:6px;
      padding-bottom:10px; border-bottom:1px solid var(--line)}  /* trennt von Radar-Zeitstrahl */
  .bars[hidden], .hours[hidden]{display:none}
  .fc-head{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
  .fc-title{font-size:11px; letter-spacing:.08em; text-transform:uppercase;
            color:var(--muted); font-weight:600}
  .fc-note{font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums}
  .bars{display:flex; align-items:flex-end; gap:3px; height:46px}
  .bars .b{flex:1 1 0; min-width:0; height:100%;
           display:flex; flex-direction:column; justify-content:flex-end}
  .bars .b .fill{width:100%; min-height:2px; border-radius:3px 3px 0 0; background:#3FA0E0}
  .bars .b.dry .fill{background:rgba(255,255,255,.12)}
  .hours{display:flex; gap:3px; font-size:9px; color:var(--muted);
         font-variant-numeric:tabular-nums}
  .hours span{flex:1 1 0; min-width:0; text-align:center}

  /* Status */
  .overlay{
    inset:0; z-index:1100; position:fixed; display:none; place-items:center; padding:24px;
    background:rgba(12,19,32,.6); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  }
  .overlay.show{display:grid}
  .box{max-width:340px; text-align:center}
  .box .h{font-family:var(--display); font-weight:600; font-size:1.4rem; margin:0 0 8px}
  .box .p{color:var(--muted); margin:0 0 16px; font-size:.95rem}
  .box button{
    appearance:none; border:1px solid var(--line); background:rgba(255,255,255,.06);
    color:var(--ink); font-family:var(--body); font-weight:600; font-size:.9rem;
    padding:9px 16px; border-radius:999px; cursor:pointer;
  }
  .box button:focus-visible{outline:2px solid var(--now); outline-offset:2px}

  /* Leaflet auf dunkel abstimmen */
  .leaflet-control-zoom{border:none!important; margin-top:12px!important; margin-right:12px!important}
  .leaflet-control-zoom a{
    background:var(--panel)!important; color:var(--ink)!important; border:1px solid var(--line)!important;
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  }
  /* Standort-Button */
  .leaflet-control.locate{margin-right:12px!important}
  .leaflet-control.locate a{
    display:block; width:30px; height:30px; line-height:30px; text-align:center;
    background:var(--panel)!important; color:var(--ink)!important; border:1px solid var(--line)!important;
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  }
  .leaflet-control.locate a:hover{background:rgba(255,255,255,.1)!important}
  .leaflet-control.locate a.on{color:var(--now)!important}
  .leaflet-control.locate svg{width:16px; height:16px; vertical-align:middle;
    fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round}
  .leaflet-control-attribution{
    background:rgba(12,19,32,.7)!important; color:var(--muted)!important; font-size:10px!important;
  }
  .leaflet-control-attribution a{color:var(--muted)!important}
</style>
</head>
<body>
  <div id="map"></div>

  <header class="panel head">
    <div class="title">
      <span class="eyebrow">Regenradar · München<span class="net" id="net" hidden></span></span>
      <span class="stamp" id="stamp">lädt…</span>
    </div>
  </header>

  <section class="panel controls" id="controls" hidden>
    <div class="fc" id="fc" hidden>
      <div class="fc-head">
        <span class="fc-title">Regen · nächste 12 h</span>
        <span class="fc-note" id="fcNote"></span>
      </div>
      <div class="bars" id="bars"></div>
      <div class="hours" id="hours"></div>
    </div>
    <div class="row">
      <button class="play" id="play" type="button" aria-label="Abspielen">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <input type="range" id="scrub" min="0" max="0" value="0" step="1" aria-label="Zeitpunkt wählen" />
    </div>
    <div class="axis">
      <span class="now" id="tNow">Jetzt</span>
      <div class="ticks" id="ticks"></div>
      <div class="labels">
        <span class="start" id="tStart"></span>
        <span class="end" id="tEnd"></span>
      </div>
    </div>
    <div class="meta">
      <span class="legend"><i></i> mehr Regen →</span>
      <span>Daten: <a href="https://www.rainviewer.com/" target="_blank" rel="noopener">RainViewer</a></span>
    </div>
  </section>

  <div class="overlay" id="overlay">
    <div class="box">
      <p class="h" id="ovh">Radar nicht geladen</p>
      <p class="p" id="ovp">Verbindung prüfen und neu laden.</p>
      <button id="retry" type="button">Neu laden</button>
    </div>
  </div>

    const acc = pos.coords.accuracy || 0;
    if (!geoDot){
      geoAcc = L.circle(ll, { radius: acc, renderer: locRenderer, pane: "loc",
        color: "#4DA3FF", weight: 1, opacity: .4, fillColor: "#4DA3FF", fillOpacity: .12,
        interactive: false }).addTo(map);
      geoDot = L.circleMarker(ll, { radius: 6, renderer: locRenderer, pane: "loc",
        color: "#fff", weight: 2, fillColor: "#4DA3FF", fillOpacity: 1 })
        .addTo(map).bindTooltip("Dein Standort");
    } else {
      geoDot.setLatLng(ll); geoAcc.setLatLng(ll).setRadius(acc);
    }
    if (geoFirst){ geoFirst = false; map.setView(ll, Math.max(map.getZoom(), 12)); }
  }

  function onGeoErr(err){
    console.warn("geo", err);
    if (err.code === 1){                       // Freigabe verweigert → abschalten
      geoStop();
      const b = $("locate"); if (b) b.title = "Standortfreigabe verweigert";
    }
    // Timeout/unavailable: watchPosition läuft weiter, nichts tun
  }

  function geoStart(){
    geoActive = true; geoFirst = true;
    const b = $("locate"); if (b) b.classList.add("on");
    geoWatch = navigator.geolocation.watchPosition(onGeo, onGeoErr, {
      enableHighAccuracy: true, maximumAge: 10000, timeout: 15000
    });
  }

  if ("geolocation" in navigator){
    const LocateCtl = L.Control.extend({
      options: { position: "topright" },
      onAdd(){
        const div = L.DomUtil.create("div", "leaflet-bar locate");
        const a = L.DomUtil.create("a", "", div);
        a.href = "#"; a.id = "locate"; a.title = "Mein Standort";
        a.setAttribute("role", "button"); a.setAttribute("aria-label", "Mein Standort");
        a.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5"/>'
          + '<line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>'
          + '<line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>';
        L.DomEvent.on(a, "click", L.DomEvent.stop);
        L.DomEvent.on(a, "click", () => geoActive ? geoStop() : geoStart());
        return div;
      }
    });
    map.addControl(new LocateCtl());
  }

  let host = "", frames = [], idx = 0, nowIdx = 0, timer = null, playing = false;
  const layers = {};

  const fmt = (unix) => new Date(unix * 1000)
    .toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Berlin" });

  function tileUrl(path){ return `${host}${path}/${SIZE}/{z}/{x}/{y}/${COLOR}/${OPTIONS}.png`; }

  function ensureLayer(i){
    const f = frames[i];
    if (!layers[f.path]){
      layers[f.path] = L.tileLayer(tileUrl(f.path), {
        tileSize: SIZE, opacity: 0, maxNativeZoom: 7, maxZoom: 19, zIndex: 10,
        attribution: "Weather data by RainViewer"
      }).addTo(map);
    }
    return layers[f.path];
  }

  function updateLabel(){
    const f = frames[idx];
    const future = f.time * 1000 > Date.now();
    $("stamp").innerHTML = `${fmt(f.time)} <span class="kind${future ? " fc" : ""}">`
      + `${future ? "Vorhersage" : "Radar"}</span>`;
    const s = $("scrub");
    s.value = idx;
    s.style.setProperty("--pct", (idx / Math.max(1, frames.length - 1) * 100) + "%");
  }

  function renderAxis(){
    const n = frames.length, last = Math.max(1, n - 1);
    const ticks = $("ticks");
    ticks.innerHTML = "";
    frames.forEach((f, i) => {
      const t = document.createElement("i");
      t.style.left = (i / last * 100) + "%";
      t.className = i === nowIdx ? "now" : (i > nowIdx ? "fc" : "");
      ticks.appendChild(t);
    });
    $("tStart").textContent = fmt(frames[0].time);
    $("tEnd").textContent = fmt(frames[n - 1].time);
    const now = $("tNow"), noFc = nowIdx >= n - 1;
    now.textContent = "Jetzt " + fmt(frames[nowIdx].time);
    // Ohne Vorhersage fällt „Jetzt" mit dem Ende zusammen → End-Label ausblenden,
    // Marke rechtsbündig statt zentriert (sonst Überlappung / Abschneiden am Rand)
    $("tEnd").style.display = noFc ? "none" : "";
    if (noFc){
      now.style.left = "auto"; now.style.right = "0"; now.style.transform = "none";
    } else {
      now.style.right = "auto"; now.style.left = (nowIdx / last * 100) + "%";
      now.style.transform = "translateX(-50%)";
    }
  }

  function show(i){
    if (!frames.length) return;
    i = ((i % frames.length) + frames.length) % frames.length;
    const prev = frames[idx] ? frames[idx].path : null;
    idx = i;
    ensureLayer(i).setOpacity(OPACITY);
    ensureLayer((i + 1) % frames.length);              // nächsten Frame vorladen
    if (prev && prev !== frames[i].path && layers[prev]) layers[prev].setOpacity(0);
    updateLabel();
  }

  function tick(){
    show(idx + 1 >= frames.length ? 0 : idx + 1);
    timer = setTimeout(tick, idx === frames.length - 1 ? PAUSE_MS : STEP_MS);
  }
  function play(){ if (playing) return; playing = true; setIcon(true); tick(); }
  function pause(){ playing = false; setIcon(false); if (timer){ clearTimeout(timer); timer = null; } }
  function setIcon(on){
    $("playIcon").innerHTML = on
      ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'   // Pause
      : '<path d="M8 5v14l11-7z"/>';               // Play
    $("play").setAttribute("aria-label", on ? "Pause" : "Abspielen");
  }

  function rebuild(json){
    // alte Layer entfernen
    Object.values(layers).forEach((l) => map.removeLayer(l));
    for (const k in layers) delete layers[k];

    host = json.host || "";
    const past = (json.radar && json.radar.past) || [];
    const now  = (json.radar && json.radar.nowcast) || [];
    frames = [...past, ...now];
    if (!frames.length) throw new Error("keine Frames");

    $("scrub").max = frames.length - 1;
    nowIdx = Math.max(0, past.length - 1); // Grenze Radar/Vorhersage (~jetzt)
    idx = nowIdx;                          // Start beim aktuellsten Messbild
    renderAxis();
    show(idx);
    $("controls").hidden = false;
    $("overlay").classList.remove("show");
  }

  let busy = false;
  async function load(){
    if (busy) return; busy = true;
    try{
      const res = await fetchTimeout(API, { cache: "no-store" }, 12000);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      const wasPlaying = playing;
      pause();
      rebuild(json);
      if (wasPlaying) play();
      setNet("");                       // aktueller Stand
    }catch(e){
      console.error(e);
      if (frames.length){               // letzten Stand behalten, nur markieren
        setNet(navigator.onLine ? "veraltet" : "offline");
      } else {                          // noch nie etwas geladen → Overlay
        $("overlay").classList.add("show");
      }
    }finally{ busy = false; }
  }

  // Stundenvorhersage (Open-Meteo) — unabhängig vom Radar
  // Farbe nach Intensität (mm/h), passend zur Radar-Legende
  function rainColor(mm){
    if (mm >= 5)   return "#7E58C8";   // sehr stark
    if (mm >= 2)   return "#2C6FC6";   // stark
    if (mm >= 0.5) return "#3FA0E0";   // mäßig
    return "#9BE1F5";                  // leicht
  }

  function renderForecast(h){
    const times = h.time || [], pr = h.precipitation || [], pp = h.precipitation_probability || [];
    const n = Math.min(times.length, FC_HOURS);
    if (!n){ $("fc").hidden = true; return; }
    const vals = pr.slice(0, n);
    const max = Math.max(0, ...vals);
    const scale = Math.max(max, 0.3);           // relativ skalieren, mind. 0.3 mm als Referenz
    const bars = $("bars"), hours = $("hours");
    bars.innerHTML = ""; hours.innerHTML = "";
    for (let i = 0; i < n; i++){
      const mm = vals[i] || 0, dry = mm < 0.05;
      const b = document.createElement("div");
      b.className = "b" + (dry ? " dry" : "");
      b.title = times[i].slice(11, 16) + " · " + mm.toFixed(1) + " mm/h"
        + (pp[i] != null ? " · " + pp[i] + " %" : "");
      const fill = document.createElement("div");
      fill.className = "fill";
      fill.style.height = (dry ? 2 : Math.max(4, mm / scale * 100)) + "%";
      if (!dry) fill.style.background = rainColor(mm);
      b.appendChild(fill);
      bars.appendChild(b);
      const s = document.createElement("span");
      s.textContent = times[i].slice(11, 13);    // Stunde
      hours.appendChild(s);
    }
    const dry = max < 0.05;
    $("bars").hidden = dry;                      // bei Trockenheit auf eine Zeile einklappen
    $("hours").hidden = dry;
    $("fcNote").textContent = dry ? "kein Regen erwartet" : "bis " + max.toFixed(1) + " mm/h";
    $("fc").hidden = false;
  }

  async function loadForecast(){
    try{
      const res = await fetchTimeout(FC_API, { cache: "no-store" }, 12000);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      renderForecast(json.hourly || {});
    }catch(e){
      console.error("forecast", e);
      if (!$("bars").children.length) $("fc").hidden = true;  // sonst letzten Stand behalten
    }
  }

  // Events
  $("play").addEventListener("click", () => playing ? pause() : play());
  $("scrub").addEventListener("input", (e) => { pause(); show(parseInt(e.target.value, 10)); });
  $("retry").addEventListener("click", load);
  document.addEventListener("visibilitychange", () => { if (!document.hidden){ load(); loadForecast(); } });
  window.addEventListener("online", () => { setNet(""); load(); loadForecast(); });
  window.addEventListener("offline", () => { if (frames.length) setNet("offline"); });
  setInterval(() => { load(); loadForecast(); }, REFRESH_MS);

  load();
  loadForecast();

  // Service Worker: Offline-Fähigkeit + Caching
  if ("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW", e));
    });
  }
})();
</script>
</body>
</html>
